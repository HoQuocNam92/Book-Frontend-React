name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Lint, Type Check & Build
  # ──────────────────────────────────────────────
  build:
    name: 🎨 Lint, Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🔎 Type Check
        run: npx tsc --noEmit

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:8080/api' }}
          VITE_STORAGE_KEY: alphabooks_chatbot_history
          VITE_MAX_HISTORY: "100"
          VITE_GOONG_API_KEY: ${{ secrets.VITE_GOONG_API_KEY }}
          VITE_GOONG_MAP_KEY: ${{ secrets.VITE_GOONG_MAP_KEY }}
          VITE_WAREHOUSE_LAT: "21.028511"
          VITE_WAREHOUSE_LNG: "105.804817"
          VITE_GOONG_VEHICLE: bike

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

  # ──────────────────────────────────────────────
  # Docker Build Verification
  # ──────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: alphabooks-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
